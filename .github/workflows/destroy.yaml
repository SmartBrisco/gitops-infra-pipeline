name: Terraform Destroy

on:
  workflow_dispatch:
  push:
    branches:
      - destroy

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: terraform

      - name: Notify Slack - Destroyed
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🗑️ *Infrastructure Destroyed Successfully*\n*Triggered by:* ${{ github.actor }}\n*Commit:* ${{ github.sha }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Destroy Failed
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"❌ *Infrastructure Destroy Failed*\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Audit
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_AUDIT }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"📋 *Audit Log - Destroy*\n*Status:* ${{ job.status }}\n*Triggered by:* ${{ github.actor }}\n*Run ID:* ${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"