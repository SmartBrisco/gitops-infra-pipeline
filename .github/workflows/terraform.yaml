name: GitOps Infrastructure Pipeline

on:
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'Deploy to prod? (yes/no)'
        required: true
        default: 'no'

permissions:
  id-token: write
  contents: read

jobs:

  # -----------------------------------------
  # OPA POLICY TESTS
  # -----------------------------------------
  policy-test:
    name: OPA Policy Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Terraform Init (AWS Dev)
        run: terraform init -backend=false -reconfigure
        working-directory: terraform/aws/dev

      - name: Terraform Plan JSON (AWS Dev)
        run: terraform plan -out=tfplan.binary && terraform show -json tfplan.binary > tfplan.json
        working-directory: terraform/aws/dev
        env:
          AWS_ACCESS_KEY_ID: "mock"
          AWS_SECRET_ACCESS_KEY: "mock"
          AWS_DEFAULT_REGION: "us-east-1"

      - name: OPA Policy Test (AWS Dev)
        run: conftest test tfplan.json --policy ../../../policy --namespace terraform.policies
        working-directory: terraform/aws/dev

      - name: Terraform Init (GCP)
        run: terraform init
        working-directory: terraform/gcp

      - name: Terraform Plan JSON (GCP)
        run: terraform plan -out=tfplan.binary && terraform show -json tfplan.binary > tfplan.json
        working-directory: terraform/gcp

      - name: OPA Policy Test (GCP)
        run: conftest test tfplan.json --policy ../../policy --namespace terraform.policies
        working-directory: terraform/gcp

      - name: Notify Slack - Policy Test Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *OPA Policy Test Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

  # -----------------------------------------
  # AWS DEV
  # -----------------------------------------
  deploy-aws-dev:
    name: AWS Dev Deploy
    needs: [policy-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init (AWS Dev)
        run: terraform init -reconfigure
        working-directory: terraform/aws/dev

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform/aws/dev

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/aws/dev

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: tflint --init && tflint
        working-directory: terraform/aws/dev

      - name: Trivy IaC Scan