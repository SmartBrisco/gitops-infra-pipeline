name: GitOps Infrastructure Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

  # -----------------------------------------
  # OPA POLICY TESTS
  # Runs before all cloud deploy jobs.
  # deploy-aws, deploy-gcp, deploy-azure all
  # declare: needs: [policy-test]
  # -----------------------------------------
  policy-test:
    name: OPA Policy Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      # AWS plan → JSON → Conftest
      - name: Terraform Init (AWS)
        run: terraform init
        working-directory: terraform/aws

      - name: Terraform Plan JSON (AWS)
        run: terraform plan -out=tfplan.binary && terraform show -json tfplan.binary > tfplan.json
        working-directory: terraform/aws
        env:
          AWS_ACCESS_KEY_ID: "mock"
          AWS_SECRET_ACCESS_KEY: "mock"
          AWS_DEFAULT_REGION: "us-east-1"

      - name: OPA Policy Test (AWS)
        run: conftest test tfplan.json --policy ../../policy --namespace terraform.policies
        working-directory: terraform/aws

      # GCP plan → JSON → Conftest
      - name: Terraform Init (GCP)
        run: terraform init
        working-directory: terraform/gcp

      - name: Terraform Plan JSON (GCP)
        run: terraform plan -out=tfplan.binary && terraform show -json tfplan.binary > tfplan.json
        working-directory: terraform/gcp

      - name: OPA Policy Test (GCP)
        run: conftest test tfplan.json --policy ../../policy --namespace terraform.policies
        working-directory: terraform/gcp

      # # Azure plan → JSON → Conftest
      # - name: Terraform Init (Azure)
      #   run: terraform init
      #   working-directory: terraform/azure

      # - name: Terraform Plan JSON (Azure)
      #   run: terraform plan -out=tfplan.binary && terraform show -json tfplan.binary > tfplan.json
      #   working-directory: terraform/azure

      # - name: OPA Policy Test (Azure)
      #   run: conftest test tfplan.json --policy ../../policy --namespace terraform.policies
      #   working-directory: terraform/azure

      - name: Notify Slack - Policy Test Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *OPA Policy Test Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"



  # -----------------------------------------
  # AWS
  # -----------------------------------------
  deploy-aws:
    name: AWS Deploy
    needs: [policy-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: terraform/aws

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: terraform/aws

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: terraform/aws

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: tflint --init && tflint
        working-directory: terraform/aws

      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform/aws
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan
        working-directory: terraform/aws

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/aws

      - name: Get Terraform Outputs
        id: outputs
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "public_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT
          echo "instance_state=$(terraform output -raw instance_state)" >> $GITHUB_OUTPUT
        working-directory: terraform/aws

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"✅ *AWS Infrastructure Deployed*\n*Instance ID:* ${{ steps.outputs.outputs.instance_id }}\n*Public IP:* ${{ steps.outputs.outputs.public_ip }}\n*Region:* us-east-1\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *AWS Deployment Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Audit
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_AUDIT }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"📋 *Audit Log - AWS*\n*Status:* ${{ job.status }}\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Run ID:* ${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

  # -----------------------------------------
  # GCP
  # -----------------------------------------
  deploy-gcp:
    name: GCP Deploy
    needs: [policy-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Swap this step out for real OIDC when you have a GCP account:
      #
      # - name: Authenticate to GCP via Workload Identity Federation
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      #     service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: terraform/gcp

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: terraform/gcp

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: terraform/gcp

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: tflint --init && tflint
        working-directory: terraform/gcp

      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform/gcp
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Terraform Plan
        id: plan
        run: terraform plan
        working-directory: terraform/gcp

      # Uncomment when real GCP credentials are configured:
      # - name: Terraform Apply
      #   id: apply
      #   run: terraform apply -auto-approve
      #   working-directory: terraform/gcp

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"✅ *GCP Infrastructure Validated*\n*Status:* Plan passed (apply disabled — no credentials)\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *GCP Deployment Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Audit
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_AUDIT }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"📋 *Audit Log - GCP*\n*Status:* ${{ job.status }}\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Run ID:* ${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

  # -----------------------------------------
  # AZURE
  # -----------------------------------------
  deploy-azure:
    name: Azure Deploy
    needs: [policy-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Swap this step out for real OIDC when you have an Azure account:
      #
      # - name: Authenticate to Azure via Federated Credentials
      #   uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: terraform/azure

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: terraform/azure

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: terraform/azure

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: tflint --init && tflint
        working-directory: terraform/azure

      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform/azure
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      # Azure plan requires active credentials - skipped until account configured
      - name: Terraform Plan
        id: plan
        run: terraform plan
        working-directory: terraform/azure
        continue-on-error: true
        

      # Uncomment when real Azure credentials are configured:
      # - name: Terraform Apply
      #   id: apply
      #   run: terraform apply -auto-approve
      #   working-directory: terraform/azure

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"✅ *Azure Infrastructure Validated*\n*Status:* Plan passed (apply disabled — no credentials)\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *Azure Deployment Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Audit
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_AUDIT }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"📋 *Audit Log - Azure*\n*Status:* ${{ job.status }}\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Run ID:* ${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"
