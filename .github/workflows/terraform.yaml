name: GitOps Infrastructure Pipeline

on:
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'Deploy to prod? (yes/no)'
        required: true
        default: 'no'

permissions:
  id-token: write
  contents: read

jobs:

  # -----------------------------------------
  # OPA POLICY TESTS
  # -----------------------------------------
  policy-test:
    name: OPA Policy Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Terraform Init (AWS Dev)
        run: terraform init -backend=false
        working-directory: terraform/aws/dev

      - name: Terraform Plan JSON (AWS Dev)
        run: terraform plan -out=tfplan.binary && terraform show -json tfplan.binary > tfplan.json
        working-directory: terraform/aws/dev
        env:
          AWS_ACCESS_KEY_ID: "mock"
          AWS_SECRET_ACCESS_KEY: "mock"
          AWS_DEFAULT_REGION: "us-east-1"

      - name: OPA Policy Test (AWS Dev)
        run: conftest test tfplan.json --policy ../../../policy --namespace terraform.policies
        working-directory: terraform/aws/dev

      - name: Terraform Init (GCP)
        run: terraform init
        working-directory: terraform/gcp

      - name: Terraform Plan JSON (GCP)
        run: terraform plan -out=tfplan.binary && terraform show -json tfplan.binary > tfplan.json
        working-directory: terraform/gcp

      - name: OPA Policy Test (GCP)
        run: conftest test tfplan.json --policy ../../policy --namespace terraform.policies
        working-directory: terraform/gcp

      - name: Notify Slack - Policy Test Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *OPA Policy Test Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

  # -----------------------------------------
  # AWS DEV
  # -----------------------------------------
  deploy-aws-dev:
    name: AWS Dev Deploy
    needs: [policy-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init (AWS Prod)
        run: terraform init -backend=false
        working-directory: terraform/aws/dev

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform/aws/dev

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/aws/dev

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: tflint --init && tflint
        working-directory: terraform/aws/dev

      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform/aws/dev
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform/aws/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/aws/dev

      - name: Get Terraform Outputs
        id: outputs
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT
          echo "public_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT
          echo "instance_state=$(terraform output -raw instance_state)" >> $GITHUB_OUTPUT
          echo "eks_cluster=$(terraform output -raw eks_cluster_name)" >> $GITHUB_OUTPUT
        working-directory: terraform/aws/dev

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"✅ *AWS Dev Infrastructure Deployed*\n*Instance ID:* ${{ steps.outputs.outputs.instance_id }}\n*Public IP:* ${{ steps.outputs.outputs.public_ip }}\n*EKS Cluster:* ${{ steps.outputs.outputs.eks_cluster }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *AWS Dev Deployment Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Audit
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_AUDIT }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"📋 *Audit Log - AWS Dev*\n*Status:* ${{ job.status }}\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Run ID:* ${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

  # -----------------------------------------
  # PROD SECURITY GATES
  # Trivy + OPA against prod config
  # Only runs if deploy_prod = yes
  # -----------------------------------------
  prod-security-gates:
    name: Prod Security Gates
    needs: [deploy-aws-dev]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_prod == 'yes' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy IaC Scan - Prod
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform/aws/prod
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init (AWS Prod)
        run: terraform init
        working-directory: terraform/aws/prod

      - name: Terraform Plan JSON (AWS Prod)
        run: terraform plan -out=tfplan.binary && terraform show -json tfplan.binary > tfplan.json
        working-directory: terraform/aws/prod

      - name: OPA Policy Test (AWS Prod)
        run: conftest test tfplan.json --policy ../../../policy --namespace terraform.policies
        working-directory: terraform/aws/prod

      - name: Notify Slack - Gates Passed
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🔒 *Prod Security Gates Passed*\n*Trivy:* Clean\n*OPA:* Compliant\n*Awaiting manual approval for prod deploy*\n*Triggered by:* ${{ github.actor }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Gates Failed
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *Prod Security Gates Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

  # -----------------------------------------
  # MANUAL APPROVAL GATE
  # -----------------------------------------
  prod-approval:
    name: Manual Prod Approval
    needs: [prod-security-gates]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_prod == 'yes' }}
    environment: prod

    steps:
      - name: Awaiting approval
        run: echo "Approved for prod deploy"

  # -----------------------------------------
  # AWS PROD
  # -----------------------------------------
  deploy-aws-prod:
    name: AWS Prod Deploy
    needs: [prod-approval]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_prod == 'yes' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/aws/prod

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform/aws/prod

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/aws/prod

      - name: Get Terraform Outputs
        id: outputs
        run: |
          echo "eks_cluster=$(terraform output -raw eks_cluster_name)" >> $GITHUB_OUTPUT
          echo "eks_endpoint=$(terraform output -raw eks_cluster_endpoint)" >> $GITHUB_OUTPUT
        working-directory: terraform/aws/prod

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"✅ *AWS Prod Infrastructure Deployed*\n*EKS Cluster:* ${{ steps.outputs.outputs.eks_cluster }}\n*Endpoint:* ${{ steps.outputs.outputs.eks_endpoint }}\n*Commit:* ${{ github.sha }}\n*Approved and deployed by:* ${{ github.actor }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *AWS Prod Deployment Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Audit
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_AUDIT }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"📋 *Audit Log - AWS Prod*\n*Status:* ${{ job.status }}\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Run ID:* ${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

  # -----------------------------------------
  # GCP
  # -----------------------------------------
  deploy-gcp:
    name: GCP Deploy
    needs: [policy-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/gcp

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform/gcp

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/gcp

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: tflint --init && tflint
        working-directory: terraform/gcp

      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform/gcp
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform/gcp

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"✅ *GCP Infrastructure Validated*\n*Status:* Plan passed (apply disabled — no credentials)\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *GCP Deployment Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Audit
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_AUDIT }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"📋 *Audit Log - GCP*\n*Status:* ${{ job.status }}\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Run ID:* ${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

  # -----------------------------------------
  # AZURE
  # -----------------------------------------
  deploy-azure:
    name: Azure Deploy
    needs: [policy-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/azure

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform/azure

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/azure

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: tflint --init && tflint
        working-directory: terraform/azure

      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform/azure
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform/azure
        continue-on-error: true

      - name: Notify Slack - Success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"✅ *Azure Infrastructure Validated*\n*Status:* Plan passed (apply disabled — no credentials)\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"🚨 *Azure Deployment Failed*\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"

      - name: Notify Slack - Audit
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_AUDIT }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          -d "{\"text\":\"📋 *Audit Log - Azure*\n*Status:* ${{ job.status }}\n*Workflow:* ${{ github.workflow }}\n*Commit:* ${{ github.sha }}\n*Triggered by:* ${{ github.actor }}\n*Run ID:* ${{ github.run_id }}\"}" \
          "$SLACK_WEBHOOK"